<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday 🎉</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #ff9a9e, #fad0c4);
        text-align: center;
        color: white;
        overflow-x: hidden;
    }

    h1 {
        margin-top: 40px;
        font-size: 2.2rem;
    }

    .container {
        padding: 20px;
        max-width: 500px;
        margin: auto;
    }

    ul {
        list-style: none;
        padding: 0;
    }

    li {
        background: rgba(255,255,255,0.2);
        margin: 10px 0;
        padding: 15px;
        border-radius: 15px;
        font-size: 1rem;
        backdrop-filter: blur(5px);
    }

    button {
        margin-top: 20px;
        padding: 12px 20px;
        border: none;
        border-radius: 25px;
        font-size: 1rem;
        background: white;
        color: #ff6f91;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: #ff6f91;
        color: white;
    }

    canvas {
        position: fixed;
        top: 0;
        left: 0;
        pointer-events: none;
    }
</style>
</head>

<body>

<canvas id="confetti"></canvas>

<div class="container">
    <h1>🎂 Happy Birthday! 🎉</h1>

    <ul>
        <li>💖 May all your dreams come true</li>
        <li>🌟 Success in everything you do</li>
        <li>😊 Endless happiness and laughter</li>
        <li>🎁 Surprises and beautiful moments</li>
        <li>💪 Strength and good health always</li>
    </ul>

    <button onclick="startConfetti()">Celebrate 🎊</button>
</div>

<script>
const canvas = document.getElementById("confetti");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});

let confetti = [];

function createConfetti() {
    for (let i = 0; i < 150; i++) {
        confetti.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height - canvas.height,
            r: Math.random() * 6 + 4,
            d: Math.random() * 50,
            color: `hsl(${Math.random() * 360}, 100%, 50%)`,
            tilt: Math.random() * 10 - 10
        });
    }
}

function drawConfetti() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    confetti.forEach((c, index) => {
        ctx.beginPath();
        ctx.fillStyle = c.color;
        ctx.arc(c.x, c.y, c.r, 0, Math.PI * 2, false);
        ctx.fill();
    });

    updateConfetti();
}

function updateConfetti() {
    confetti.forEach((c, index) => {
        c.y += Math.cos(c.d) + 2;
        c.x += Math.sin(c.d);

        if (c.y > canvas.height) {
            confetti[index] = {
                x: Math.random() * canvas.width,
                y: -10,
                r: c.r,
                d: c.d,
                color: c.color,
                tilt: c.tilt
            };
        }
    });
}

function startConfetti() {
    confetti = [];
    createConfetti();
    setInterval(drawConfetti, 20);
}
</script>

</body>
</html>
